{{ .AndrewPartialFile.head title="mentorship calendar"}}

<body>
  {{ .AndrewPartialFile.navigation }}
  <main>
    <article>
      <!-- Cal inline embed code begins -->
      <div style="width: 100%; height: 100%; overflow: scroll" id="my-cal-inline-coaching-mentorship"></div>
      <script type="text/javascript">
        (function (C, A, L) {
          let p = function (a, ar) {
            a.q.push(ar);
          };
          let d = C.document;
          C.Cal =
            C.Cal ||
            function () {
              let cal = C.Cal;
              let ar = arguments;
              if (!cal.loaded) {
                cal.ns = {};
                cal.q = cal.q || [];
                d.head.appendChild(d.createElement("script")).src = A;
                cal.loaded = true;
              }
              if (ar[0] === L) {
                const api = function () {
                  p(api, arguments);
                };
                const namespace = ar[1];
                api.q = api.q || [];
                if (typeof namespace === "string") {
                  cal.ns[namespace] = cal.ns[namespace] || api;
                  p(cal.ns[namespace], ar);
                  p(cal, ["initNamespace", namespace]);
                } else p(cal, ar);
                return;
              }
              p(cal, ar);
            };
        })(window, "https://app.cal.com/embed/embed.js", "init");
        Cal("init", "coaching-mentorship", { origin: "https://app.cal.com" });
        Cal.config = Cal.config || {};
        Cal.config.forwardQueryParams = true;

        Cal.ns["coaching-mentorship"]("inline", {
          elementOrSelector: "#my-cal-inline-coaching-mentorship",
          config: { layout: "month_view", useSlotsViewOnSmallScreen: "true" },
          calLink: "playtechnique/coaching-mentorship",
        });

        Cal.ns["coaching-mentorship"]("ui", { hideEventTypeDetails: false, layout: "month_view" });
      </script>
      <!-- Cal inline embed code ends -->
      <p style="text-align: center">
        Need something interesting to read while waiting for our session? Try out
        <a href="/archeology/index.html">a newsletter I wrote</a>
        .
      </p>
    </article>
  </main>
</body>
